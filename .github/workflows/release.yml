name: release
on:
  push:
    tags: ["v*"]
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
  build:
    needs: create
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            name: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            name: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: ""
            name: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            name: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: upload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/todo${{ matrix.suffix }}"
          cp "$SRC" "todo-${{ matrix.name }}${{ matrix.suffix }}"
          cp "$SRC" "todo-${{ matrix.name }}-${{ github.ref_name }}${{ matrix.suffix }}"
          gh release upload "${{ github.ref_name }}" \
            "todo-${{ matrix.name }}${{ matrix.suffix }}" \
            "todo-${{ matrix.name }}-${{ github.ref_name }}${{ matrix.suffix }}" \
            --clobber
