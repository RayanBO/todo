name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "" \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
  build:
    needs: create
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            name: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            name: macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            name: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: upload exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          SRC="target/${{ matrix.target }}/release/todo.exe"
          cp "$SRC" "todo-x64.exe"
          cp "$SRC" "todo-x64-${VER}.exe"
          gh release upload "$VER" "todo-x64.exe" "todo-x64-${VER}.exe" --clobber
      - name: install WiX
        run: choco install wixtoolset --no-progress -y
      - name: build msi
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace "^v", ""
          & "${env:WIX}bin\candle.exe" wix\main.wxs "-dVersion=$ver" -out todo.wixobj
          & "${env:WIX}bin\light.exe" todo.wixobj "-out" "todo-x64-$env:GITHUB_REF_NAME.msi"
      - name: upload msi
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cp "todo-x64-${{ github.ref_name }}.msi" "todo-x64.msi"
          gh release upload "${{ github.ref_name }}" \
            "todo-x64.msi" \
            "todo-x64-${{ github.ref_name }}.msi" \
            --clobber
