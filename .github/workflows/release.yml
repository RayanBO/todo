name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: todo-windows-x64.exe
            binary: target/release/todo.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: todo-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/todo

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: todo-macos-arm64
            binary: target/aarch64-apple-darwin/release/todo

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: todo-macos-x64
            binary: target/x86_64-apple-darwin/release/todo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Compiler (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo build --release

      - name: Compiler (cross)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Renommer le binaire
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Install WiX
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Invoke-RestMethod -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile wix.zip
          Expand-Archive -Path wix.zip -DestinationPath wix -Force

      - name: Build MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = Select-String -Path Cargo.toml -Pattern '^version = "(\d+\.\d+\.\d+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          Write-Host "Version: $ver"
          New-Item -ItemType Directory -Force -Path target\wix | Out-Null
          Write-Host "Compiling wxs..."
          & .\wix\candle.exe -dVersion="$ver" -dBinaryPath="$pwd\target\release\todo.exe" -out target\wix\todo.wixobj wix\main.wxs
          if ($LASTEXITCODE -ne 0) { throw "candle failed ($LASTEXITCODE)" }
          Write-Host "Linking msi..."
          & .\wix\light.exe -cultures:null -out "target\wix\todo-$ver.msi" target\wix\todo.wixobj
          if ($LASTEXITCODE -ne 0) { throw "light failed ($LASTEXITCODE)" }
          Copy-Item "target\wix\todo-$ver.msi" todo-windows-x64.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: todo-windows-x64.msi
          path: todo-windows-x64.msi

  release:
    name: Créer la Release GitHub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger tous les binaires
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Créer la Release et uploader les binaires
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
