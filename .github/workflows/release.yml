name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "" \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
  build:
    needs: create
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            name: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            name: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: ""
            name: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            name: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: upload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          NAME="${{ matrix.name }}"
          SUFFIX="${{ matrix.suffix }}"
          SRC="target/${{ matrix.target }}/release/todo${SUFFIX}"
          cp "${SRC}" "todo-${NAME}${SUFFIX}"
          cp "${SRC}" "todo-${NAME}-${VER}${SUFFIX}"
          gh release upload "${VER}" \
            "todo-${NAME}${SUFFIX}" \
            "todo-${NAME}-${VER}${SUFFIX}" \
            --clobber
